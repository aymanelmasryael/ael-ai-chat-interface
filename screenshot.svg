  <text x="80" y="295" font-family="Inter,sans-serif" font-weight="700" font-size="36" fill="#0074FF">6</text>
  <text x="80" y="318" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#EFF3FC">AI Models Supported</text>
  <text x="80" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">GPT-4 Turbo, GPT-4, GPT-3.5 Turbo, Claude 3 Opus, Sonnet, Demo Mode</text>

  <rect x="345" y="260" width="255" height="130" rx="12" fill="rgba(0,116,255,0.04)" stroke="rgba(0,116,255,0.10)" stroke-width="1"/>
  <rect x="345" y="260" width="255" height="3" rx="1.5" fill="url(#lineGlow)"/>
  <text x="365" y="295" font-family="Inter,sans-serif" font-weight="700" font-size="36" fill="#0074FF">API</text>
  <text x="365" y="318" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#EFF3FC">Key Management</text>
  <text x="365" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">Secure storage for OpenAI and Anthropic API keys with parameter control</text>

