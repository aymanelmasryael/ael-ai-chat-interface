  <text x="940" y="68" font-family="'Jetbrains Mono',monospace" font-size="11" fill="#0074FF" font-weight="600">6 MODELS</text>

  <line x1="40" y1="115" x2="1160" y2="115" stroke="rgba(0,116,255,0.06)" stroke-width="1"/>

  <text x="60" y="185" font-family="Inter,sans-serif" font-weight="800" font-size="44" fill="#EFF3FC">AI Chat Interface</text>
  <text x="60" y="220" font-family="Inter,sans-serif" font-weight="400" font-size="16" fill="#7F8CFF">Unified frontend for OpenAI GPT-4 Turbo, GPT-4, GPT-3.5 Turbo, and Anthropic Claude 3 Opus and Sonnet</text>

