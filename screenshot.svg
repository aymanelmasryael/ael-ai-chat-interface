  <text x="112" y="465" font-family="Inter,sans-serif" font-weight="600" font-size="13" fill="#EFF3FC">Conversation History</text>
  <text x="112" y="483" font-family="Inter,sans-serif" font-size="11" fill="#5A6B8A">Save, load, and manage conversations with localStorage</text>

  <rect x="430" y="445" width="340" height="55" rx="10" fill="rgba(0,116,255,0.04)" stroke="rgba(0,116,255,0.08)" stroke-width="1"/>
  <circle cx="460" cy="472" r="12" fill="rgba(0,116,255,0.12)"/>
