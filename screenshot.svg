  <text x="830" y="477" font-family="Inter,sans-serif" font-size="12" fill="#0074FF" text-anchor="middle">E</text>
  <text x="852" y="465" font-family="Inter,sans-serif" font-weight="600" font-size="13" fill="#EFF3FC">Chat Export</text>
  <text x="852" y="483" font-family="Inter,sans-serif" font-size="11" fill="#5A6B8A">Download conversations as JSON files</text>

