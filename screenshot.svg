  <text x="482" y="483" font-family="Inter,sans-serif" font-size="11" fill="#5A6B8A">Test interface without API keys using simulated responses</text>

  <rect x="800" y="445" width="340" height="55" rx="10" fill="rgba(0,116,255,0.04)" stroke="rgba(0,116,255,0.08)" stroke-width="1"/>
