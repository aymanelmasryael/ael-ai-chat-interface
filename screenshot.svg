  <text x="935" y="318" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#EFF3FC">Chat Parameters</text>
  <text x="935" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">Adjustable temperature (0.0-2.0) and max tokens (100-4096)</text>

