  <text x="650" y="318" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#EFF3FC">System Prompts</text>
  <text x="650" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">Default, Developer, Writer, Analyst presets with custom option</text>

